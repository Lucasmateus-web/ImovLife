server.port=8080
spring.application.name=imovlife-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/imovlife}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

app.jwt.secret=${APP_JWT_SECRET:SW1vdkxpZmUtZGVzYWZpby10ZWNuaWNvLWp3dC1zZWdyZWRvLW11aXRvLXNpbXBsZXMtZW1iYXNlNjQ=}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:180}
