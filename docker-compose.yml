services:
  postgres:
    image: postgres:16-alpine
    container_name: imovlife-postgres
    environment:
      POSTGRES_DB: imovlife
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d imovlife"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: imovlife-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/imovlife
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_JWT_SECRET: SW1vdkxpZmUtZGVzYWZpby10ZWNuaWNvLWp3dC1zZWdyZWRvLW11aXRvLXNpbXBsZXMtZW1iYXNlNjQ=
      APP_JWT_EXPIRATION_MINUTES: 180
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: imovlife-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
